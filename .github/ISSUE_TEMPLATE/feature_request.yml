name: "✨ Feature request / 功能建议"
description: "Suggest an idea or enhancement / 提出新功能或改进建议"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem before the solution.
        感谢建议！请先描述「要解决的问题」，再描述「设想的方案」。

  - type: checkboxes
    id: preflight
    attributes:
      label: "Pre-flight checks / 提交前检查"
      options:
        - label: "I searched existing issues and discussions for a similar request. / 我已搜索现有 issue 与 discussions，未发现类似建议。"
          required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem / 要解决的问题"
      description: "What pain point or use case motivates this? / 这个建议源于什么痛点或场景？"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution / 设想的方案"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered / 考虑过的替代方案（可选）"

  - type: dropdown
    id: area
    attributes:
      label: "Affected area / 影响范围"
      options:
        - "frontend (Next.js / Remotion)"
        - "backend (FastAPI)"
        - "rendering / 渲染"
        - "deploy / 部署"
        - "docs / 文档"
        - "other / 其他"
    validations:
      required: true
