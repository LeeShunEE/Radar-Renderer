version: 2
updates:
  # 后端 Python 依赖（uv / pip 生态）
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - backend
    # 合成单个 PR，避免每包一遍的处理摩擦
    groups:
      backend:
        patterns: ["*"]

  # 前端 Node 依赖（pnpm 生态）
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - frontend
    groups:
      frontend:
        patterns: ["*"]

  # GitHub Actions 自身
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - ci
    groups:
      ci:
        patterns: ["*"]
