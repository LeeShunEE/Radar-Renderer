name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

# 同一分支的新推送会取消进行中的旧 run，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit + dev-integration + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # 钉死 uv 版本：漂移守卫按字节比对 uv export 产物，版本不一致会误报漂移。
          # 升级 uv 时需同步本字段、dependabot-lockfile-sync.yml 与本地，并重生锁文件。
          version: "0.10.3"

      - name: Set up Python
        run: uv python install 3.11

      # 漂移守卫：保证 pyproject.toml / uv.lock / requirements*.txt 三者一致（CLAUDE.md §5）。
      # 只校验不改文件——有人改了 pyproject.toml 却忘按 §5.3 重生派生锁文件时，CI 当场失败。
      # Dependabot 的 PR 由 dependabot-lockfile-sync.yml 自动回推锁文件以通过本守卫。
      - name: Lockfile drift guard (CLAUDE.md §5.3)
        run: |
          # uv.lock 与 pyproject.toml 是否同步（--locked 只断言、不写文件）
          uv lock --locked \
            || { echo "::error::uv.lock 与 pyproject.toml 不同步，请运行 'uv lock' 并提交"; exit 1; }
          # requirements*.txt 必须是 uv.lock 的确定性投影（uv export，非 pip compile 实时解析）
          uv export --no-hashes --no-emit-project --format requirements-txt -o requirements.txt
          uv export --no-hashes --no-emit-project --extra test --extra dev --format requirements-txt -o requirements-test.txt
          git diff --exit-code -- requirements.txt requirements-test.txt \
            || { echo "::error::requirements*.txt 与 uv.lock 不同步，请按 §5.3 重生并提交"; exit 1; }

      - name: Sync dependencies (test + dev)
        run: uv sync --extra test --extra dev

      - name: Ruff lint
        run: uv run ruff check app/

      - name: Pytest (unit + dev-integration, coverage gate >= 80%)
        run: >
          uv run pytest
          ../tests/unit/backend/ ../tests/dev-integration/backend/
          --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend (unit + integration + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Vitest unit (coverage gate in vitest config)
        run: pnpm test:unit

      - name: Vitest dev-integration (coverage gate in vitest config)
        run: pnpm test:integration

      - name: Build (TypeScript type check)
        run: pnpm build
