name: DCO

# 校验 PR 中每个 commit 都带 Signed-off-by（Developer Certificate of Origin）。
# 贡献者用 `git commit -s` 即可自动追加签名。详见 CONTRIBUTING.md。
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco-check:
    name: Check Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify DCO sign-off on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            author="$(git show -s --format='%an <%ae>' "$sha")"
            # 豁免 Dependabot 自身的 commit：它由 GitHub 托管、不会带 Signed-off-by，
            # 强行要求会卡死所有依赖更新 PR。dependabot-lockfile-sync 回推的同步 commit
            # 仍带 -s 签名，不在此豁免范围。
            case "$author" in
              *"dependabot[bot]"*)
                echo "跳过 Dependabot commit $sha（DCO 豁免）"
                continue
                ;;
            esac
            if ! git show -s --format='%(trailers:key=Signed-off-by)' "$sha" \
                 | grep -qiF "$author"; then
              echo "::error::Commit $sha 缺少匹配作者的 Signed-off-by（应为：$author）"
              echo "  修复：git commit --amend -s  或  git rebase --signoff $BASE_SHA"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "All commits carry a valid Signed-off-by. ✅"
