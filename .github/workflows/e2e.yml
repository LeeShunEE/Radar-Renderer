name: E2E Tests

on:
  # 发版时触发：push 到 main 分支（合并 PR 后自动部署前）
  push:
    branches: [main]
  # 也支持手动触发，便于调试
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (testenv)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      # 注入公共素材 seed（testenv 配置由测试系统提供，见 CLAUDE.md §3.3.1）。
      # 真实 *.flac/*.png 素材被 .gitignore 排除（媒体体积大），CI checkout 后
      # frontend/public/{music,silhouettes} 仅剩 .gitkeep，导致后端列举为空、
      # 前端「公共资源」区块（AssetSelector 仅在 length>0 时渲染）不出现，
      # file-and-asset-management.spec.ts 的「公共素材」用例必失败。
      # 此处生成占位素材：后端 assets_router 仅按扩展名 + stat 列举（不校验内容），
      # 前端仅列出文件名，占位文件足以驱动该列举旅程。
      # 必须在 docker compose up 之前生成——bind mount 实时反映宿主机内容。
      - name: Seed public assets (testenv)
        run: |
          mkdir -p frontend/public/music
          printf 'fLaC' > "frontend/public/music/sample-bgm.flac"
          head -c 4096 /dev/zero >> "frontend/public/music/sample-bgm.flac"

      # 启动 testenv stack (backend + frontend + render-worker + db)
      - name: Start testenv stack
        run: |
          cd deploy
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
        env:
          # docker-compose.yml 要求必填的环境变量
          # dev override 使用 SQLite，但这些变量仍需设置以通过 docker compose 解析阶段
          POSTGRES_PASSWORD: devpass
          JWT_SECRET_STRING: ci-test-secret-not-for-production

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      # 设置 Node.js 环境
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # 安装前端依赖（含 @playwright/test）
      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      # 安装 Playwright 浏览器（含系统依赖）
      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install chromium --with-deps

      # 等待服务完全就绪（backend + frontend）
      # dev stack: backend 暴露 18000:8000，frontend 暴露 13000:3000
      - name: Wait for services
        run: |
          echo "等待服务就绪..."
          for i in {1..30}; do
            backend_ready=$(curl -sf http://localhost:18000/api/v1/health > /dev/null && echo "ok" || echo "fail")
            frontend_ready=$(curl -sf http://localhost:13000/api/health > /dev/null && echo "ok" || echo "fail")
            if [ "$backend_ready" = "ok" ] && [ "$frontend_ready" = "ok" ]; then
              echo "所有服务就绪 ✓"
              exit 0
            fi
            echo "第 $i/30 次检查: backend=$backend_ready, frontend=$frontend_ready"
            sleep 5
          done
          echo "::error::服务在 150 秒后仍未就绪"
          # 输出日志便于排查
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml logs --tail=50
          exit 1
        env:
          POSTGRES_PASSWORD: devpass
          JWT_SECRET_STRING: ci-test-secret-not-for-production

      # 运行 Playwright e2e 测试
      # 使用 NODE_PATH 让测试文件能从 frontend/node_modules 解析 @playwright/test
      - name: Run Playwright e2e tests
        run: |
          cd frontend
          pnpm exec playwright test --reporter=github
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:13000
          PLAYWRIGHT_API_URL: http://localhost:18000        # 后端地址，供 auth-helpers 取码
          # 让 Node.js 从 frontend/node_modules 解析模块（测试文件在 tests 目录下）
          NODE_PATH: ${{ github.workspace }}/frontend/node_modules

      # 上传测试结果（失败时保留报告）
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      # 清理 Docker 资源
      - name: Stop testenv stack
        if: always()
        run: cd deploy && docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v
        env:
          POSTGRES_PASSWORD: devpass
          JWT_SECRET_STRING: ci-test-secret-not-for-production