# Docker Compose for Coolify/Production deployment
# radar-chart-rendering project
#
# Usage:
#   Coolify: Directly use this file (no override needed)
#   Manual: docker compose up -d
#
# Environment variables should be configured via Coolify UI or .env file

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-radar_chart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar_chart}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # 资源限制（Coolify/部署环境覆盖，不填走默认）
    mem_limit: ${DB_MEMORY_LIMIT:-512m}
    # Coolify handles port exposure automatically
    # Uncomment for local debugging:
    # ports:
    #   - "5432:5432"

  # ============================================
  # Backend (FastAPI + SQLAlchemy)
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend/Dockerfile
      target: production
    environment:
      # Database connection (asyncpg for async SQLAlchemy)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-radar_chart}
      # CORS settings
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      # JWT configuration (CHANGE IN PRODUCTION!)
      JWT_SECRET_STRING: ${JWT_SECRET_STRING:?JWT_SECRET_STRING is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      JWT_REFRESH_EXPIRE_MINUTES: ${JWT_REFRESH_EXPIRE_MINUTES:-10080}
      # Storage configuration
      STORAGE_ROOT: /app/storage
      # Render worker configuration
      RENDER_CONCURRENCY: ${RENDER_CONCURRENCY:-2}
      WORKER_BASE_URL: http://render-worker:3100
      RENDER_TIMEOUT_SECONDS: ${RENDER_TIMEOUT_SECONDS:-600}
      # OAuth (optional)
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET_SECRET_STRING: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URI: ${OAUTH_GOOGLE_REDIRECT_URI:-}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET_SECRET_STRING: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GITHUB_REDIRECT_URI: ${OAUTH_GITHUB_REDIRECT_URI:-}
      # Email (optional)
      RESEND_API_KEY_SECRET_STRING: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # 资源限制（Coolify/部署环境覆盖，不填走默认）
    mem_limit: ${BACKEND_MEMORY_LIMIT:-1g}
    cpus: ${BACKEND_CPUS:-1.0}
    # Coolify handles port exposure automatically
    # Uncomment for local debugging:
    # ports:
    #   - "8000:8000"

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend/Dockerfile
      target: production
      args:
        # NEXT_PUBLIC_API_URL is needed at build time for Next.js client-side code
        # Fallback to localhost for local builds; Coolify should override with real API URL
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:8000}
    environment:
      # Internal API URL (for server-side calls)
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # 资源限制（生产 next start 内存占用稳定，Coolify/部署环境覆盖，不填走默认）
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-512m}
    # Coolify handles port exposure automatically
    # Uncomment for local debugging:
    # ports:
    #   - "3000:3000"

  # ============================================
  # Render Worker (Remotion-based video rendering)
  # ============================================
  render-worker:
    build:
      context: ../frontend
      dockerfile: ../deploy/render-worker/Dockerfile
      target: production
    environment:
      WORKER_PORT: 3100
    volumes:
      - render_outputs:/app/output
    healthcheck:
      # 镜像（alpine + chromium/ffmpeg）未装 curl，但 busybox 自带 wget；
      # 用 curl 会让 healthcheck 永远 "curl: not found" 误报 unhealthy。
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # 资源限制（渲染吃内存，默认给大些；Coolify/部署环境覆盖，不填走默认）
    mem_limit: ${RENDER_WORKER_MEMORY_LIMIT:-2g}
    cpus: ${RENDER_WORKER_CPUS:-2.0}
    # Coolify handles port exposure automatically
    # Uncomment for local debugging:
    # ports:
    #   - "3100:3100"

# ============================================
# Volumes for persistent data
# ============================================
volumes:
  postgres_data:
    name: radar_postgres_data
  backend_storage:
    name: radar_backend_storage
  render_outputs:
    name: radar_render_outputs

# ============================================
# Network (optional, Coolify creates default)
# ============================================
networks:
  default:
    name: radar-network