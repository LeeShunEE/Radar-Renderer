# Docker Compose for local development
# radar-chart-rendering project
#
# Usage:
#   cd deploy && docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Features:
#   - SQLite for simpler setup (optional)
#   - Volume mounts for hot reload
#   - Exposed ports for direct access
#   - Development targets for debugging

services:
  # ============================================
  # PostgreSQL Database (optional, can use SQLite instead)
  # ============================================
  db:
    ports:
      - "15432:5432"

  # ============================================
  # Backend (Development mode)
  # ============================================
  backend:
    build:
      target: development
    environment:
      # Use SQLite for development (uncomment to use PostgreSQL)
      DATABASE_URL: sqlite+aiosqlite:///./storage/dev.db
      # OR use PostgreSQL (comment out SQLite line above)
      # DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD:-devpass}@db:5432/${POSTGRES_DB:-radar_chart}
      # CORS for development
      CORS_ORIGINS: '["http://localhost:13000","http://127.0.0.1:13000"]'
      # JWT for development (DO NOT USE IN PRODUCTION)
      JWT_SECRET_STRING: dev-secret-change-in-production-min-32-chars
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      JWT_REFRESH_EXPIRE_MINUTES: 10080
      # Storage
      STORAGE_ROOT: /app/storage
      # Test environment（启用测试端点如 /api/v1/auth/test/latest-code）
      TESTING: "true"
      # Render worker
      RENDER_CONCURRENCY: 2
      WORKER_BASE_URL: http://render-worker:3100
      RENDER_TIMEOUT_SECONDS: 600
    ports:
      - "18000:8000"
    volumes:
      # Mount source code for hot reload
      - ../backend/app:/app/app:ro
      - ../backend/alembic:/app/alembic:ro
      - backend_storage:/app/storage
    # Create storage directory and run migrations before starting
    entrypoint: ["sh", "-c", "mkdir -p /app/storage && cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  # ============================================
  # Frontend (Development mode)
  # ============================================
  frontend:
    build:
      target: development
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18000
    ports:
      - "13000:3000"
    volumes:
      # Mount source code for hot reload
      - ../frontend/src:/app/src:ro
      - ../frontend/public:/app/public:ro
      - ../frontend/package.json:/app/package.json:ro
    healthcheck:
      # next dev 首次按需编译 /api/health 较慢（首屏常冲到 700MB-1.2GB），
      # 放宽 start_period，避免编译完成前探测打过来误判 unhealthy。
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # next dev（on-demand 编译 + HMR + sourcemap + React 19 + Tailwind v4）首屏常冲
    # 到 700MB-1.2GB，prod 的 512m 易 OOM；dev override 覆盖为 2g，可经 env 放宽。
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-2g}
    command: ["pnpm", "dev"]

  # ============================================
  # Render Worker (Development mode)
  # ============================================
  render-worker:
    build:
      target: development
    environment:
      WORKER_PORT: 3100
    ports:
      - "13100:3100"
    volumes:
      # Mount source code for hot reload
      - ../frontend/src/remotion:/app/src/remotion:ro
      - ../frontend/public:/app/public:ro
      - ../frontend/render-worker:/app/render-worker:ro
      - render_outputs:/app/output