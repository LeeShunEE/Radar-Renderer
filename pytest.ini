[pytest]
# 测试树 tests/ 横跨各阶段；pytest 从仓库根解析 rootdir，故配置置于此。
asyncio_mode = auto
pythonpath = backend
filterwarnings =
    ignore::DeprecationWarning:starlette.testclient

# 覆盖率阈值配置（预留）
# 按 CLAUDE.md 规范：后端总覆盖率 ≥ 80%，每文件兜底 ≥ 50%
# 启用阈值校验需在 pytest 命令中添加：
#   --cov=backend/app --cov-fail-under=80 --cov-fail-on-min-line=50
# 当前阶段仅配置注释，待测试基础设施完善后启用强制阈值
